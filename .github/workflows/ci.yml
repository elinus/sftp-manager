name: Build Check

# Trigger this workflow on push or pull request to main or develop branches
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run automatically every Sunday at 8:00 AM IST (2:30 AM UTC)
    - cron: '30 2 * * 0'

# Environment variables for the entire workflow
env:
  CARGO_TERM_COLOR: always  # Force colored output for cargo commands

jobs:
  # -----------------------------
  # Job 1: Syntax and dependency check
  # -----------------------------
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Rust stable toolchain
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Step 3: Cache cargo registry to speed up downloads
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      # Step 4: Cache cargo git index (for dependencies from git repos)
      - name: Cache cargo git
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      # Step 5: Cache target directory (build artifacts)
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      # Step 6: Check that the code compiles
      - name: Check code
        run: cargo check --all-features --verbose

  # -----------------------------
  # Job 2: Run test suite
  # -----------------------------
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: check  # Run after a check job
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Cache all cargo artifacts and dependencies for faster test runs
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      # Run all tests
      - name: Run tests
        run: cargo test --all-features --verbose

  # -----------------------------
  # Job 3: Check code formatting
  # -----------------------------
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust with rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      # Run rustfmt in check mode (does not modify files)
      - name: Check formatting
        run: cargo fmt --all -- --check

  # -----------------------------
  # Job 4: Run Clippy linter
  # -----------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: check  # Run after syntax/dependency check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust with Clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Cache dependencies to speed up Clippy runs
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      # Run Clippy and treat warnings as errors
      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings

  # -----------------------------
  # Job 5: Final build check
  # -----------------------------
  build:
    name: Check Build
    runs-on: ubuntu-latest
    needs: [test, fmt, clippy]  # Run after test, fmt, and clippy jobs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Cache dependencies to speed up build
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Fast check that the project compiles
      - name: Check if code compiles
        run: cargo check --verbose

      # Optional: Actually build the project binary
      # Uncomment to build artifacts
      # - name: Build project
      #   run: cargo build --verbose

  # -----------------------------------------
  # Job 6: Notify on successful build
  # -----------------------------------------
  notify:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: build
    if: ${{ success() && github.event_name == 'push' }}

    steps:
      - name: Notify Discord Success
        continue-on-error: true
        run: |
          # Extract commit info
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -n 1 | sed 's/"/\\"/g' | cut -c1-80)
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          AUTHOR_NAME="${{ github.event.head_commit.author.name }}"
          AUTHOR_AVATAR="${{ github.event.head_commit.author.avatar_url }}"
          REPO_NAME="${{ github.repository }}"
          BRANCH_NAME="${{ github.ref_name }}"
          COMMIT_URL="${{ github.event.head_commit.url }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMPARE_URL="${{ github.event.compare }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          WORKFLOW_NAME="${{ github.workflow }}"
          
          # Get commit count (if available)
          COMMITS_COUNT="${{ github.event.commits }}"
          COMMIT_COUNT=$(echo "$COMMITS_COUNT" | jq '. | length' 2>/dev/null || echo "1")
          
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{
                 \"username\": \"CI Bot\",
                 \"avatar_url\": \"https://api.dicebear.com/7.x/identicon/svg?seed=cibot\",
                 \"embeds\": [{
                   \"title\": \"🚀 Deployment Ready! CI Passed\",
                   \"url\": \"${RUN_URL}\",
                   \"description\": \"**[${REPO_NAME}](https://github.com/${REPO_NAME})**\\nBranch: [\`${BRANCH_NAME}\`](https://github.com/${REPO_NAME}/tree/${BRANCH_NAME}) | Author: **${AUTHOR_NAME}**\\n\\n💬 [\`${SHORT_SHA}\`](${COMMIT_URL}) ${COMMIT_MSG}\",
                   \"color\": 5763719,
                   \"fields\": [
                     {
                       \"name\": \"📊 Build Status\",
                       \"value\": \"✅ All CI checks passed\\n   🔍 Syntax Check\n   🧪 Tests\n   📝 Formatting\n   📎 Clippy\n   🏗️ Build\",
                       \"inline\": false
                     },
                     {
                       \"name\": \"📦 Details\",
                       \"value\": \"Workflow: \`${WORKFLOW_NAME}\`\\nCommits: ${COMMIT_COUNT}\",
                       \"inline\": false
                     },
                     {
                       \"name\": \"🔗 Quick Links\",
                       \"value\": \"[View Changes](${COMPARE_URL}) • [Build Details](${RUN_URL})\",
                       \"inline\": false
                     }
                   ],
                   \"thumbnail\": {
                     \"url\": \"https://cdn-icons-png.flaticon.com/512/5610/5610944.png\"
                   },
                   \"timestamp\": \"${TIMESTAMP}\"
                 }]
               }" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: build
    if: ${{ failure() && github.event_name == 'push' }}

    steps:
      - name: Notify Discord Failure
        continue-on-error: true
        run: |
          # Extract commit info
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -n 1 | sed 's/"/\\"/g' | cut -c1-80)
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          AUTHOR_NAME="${{ github.event.head_commit.author.name }}"
          AUTHOR_AVATAR="${{ github.event.head_commit.author.avatar_url }}"
          REPO_NAME="${{ github.repository }}"
          BRANCH_NAME="${{ github.ref_name }}"
          COMMIT_URL="${{ github.event.head_commit.url }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          WORKFLOW_NAME="${{ github.workflow }}"
          
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{
                 \"username\": \"CI Bot\",
                 \"avatar_url\": \"https://api.dicebear.com/7.x/identicon/svg?seed=cibot\",
                 \"content\": \"⚠️ <@&YOUR_ROLE_ID> Build failed - attention required!\",
                 \"embeds\": [{
                   \"title\": \"❌ Build Failed - Action Required\",
                   \"url\": \"${RUN_URL}\",
                   \"description\": \"**[${REPO_NAME}](https://github.com/${REPO_NAME})**\\nBranch: [\`${BRANCH_NAME}\`](https://github.com/${REPO_NAME}/tree/${BRANCH_NAME}) | Author: **${AUTHOR_NAME}**\\n\\n💬 [\`${SHORT_SHA}\`](${COMMIT_URL}) ${COMMIT_MSG}\",
                   \"color\": 15548997,
                   \"fields\": [
                     {
                       \"name\": \"❗ Issue\",
                       \"value\": \"One or more CI checks failed. Review the logs and fix the issues.\",
                       \"inline\": false
                     },
                     {
                       \"name\": \"📋 Next Steps\",
                       \"value\": \"1. [Check build logs](${RUN_URL})\\n2. Fix failing tests/checks\\n3. Push fixes to \`${BRANCH_NAME}\`\",
                       \"inline\": false
                     },
                     {
                       \"name\": \"🔧 Workflow\",
                       \"value\": \"\`${WORKFLOW_NAME}\`\",
                       \"inline\": false
                     },
                     {
                       \"name\": \"🔗 Actions\",
                       \"value\": \"[View Logs](${RUN_URL}) • [Commit](${COMMIT_URL})\",
                       \"inline\": false
                     }
                   ],
                   \"thumbnail\": {
                     \"url\": \"https://cdn-icons-png.flaticon.com/512/753/753345.png\"
                   },
                   \"timestamp\": \"${TIMESTAMP}\"
                 }]
               }" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

  # -----------------------------------------
  # Notify on PR events
  # -----------------------------------------
  notify-pr:
    name: Notify Pull Request
    runs-on: ubuntu-latest
    needs: build
    if: ${{ success() && github.event_name == 'pull_request' }}

    steps:
      - name: Notify Discord PR Success
        continue-on-error: true
        run: |
          PR_TITLE=$(echo "${{ github.event.pull_request.title }}" | sed 's/"/\\"/g')
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          AUTHOR_NAME="${{ github.event.pull_request.user.login }}"
          AUTHOR_AVATAR="${{ github.event.pull_request.user.avatar_url }}"
          REPO_NAME="${{ github.repository }}"
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{
                 \"username\": \"CI Bot\",
                 \"avatar_url\": \"https://api.dicebear.com/7.x/identicon/svg?seed=cibot\",
                 \"embeds\": [{
                   \"author\": {
                     \"name\": \"${AUTHOR_NAME}\",
                     \"icon_url\": \"${AUTHOR_AVATAR}\"
                   },
                   \"title\": \"🔀 PR #${PR_NUMBER} - Checks Passed\",
                   \"url\": \"${PR_URL}\",
                   \"description\": \"**${PR_TITLE}**\\n\\n[\`${REPO_NAME}\`](https://github.com/${REPO_NAME}) • [\`${HEAD_BRANCH}\`](https://github.com/${REPO_NAME}/tree/${HEAD_BRANCH}) → [\`${BASE_BRANCH}\`](https://github.com/${REPO_NAME}/tree/${BASE_BRANCH})\\n\\n✅ Ready for review\",
                   \"color\": 8359053,
                   \"timestamp\": \"${TIMESTAMP}\"
                 }]
               }" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}